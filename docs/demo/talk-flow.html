<style>
  :root{
    --bg:#eef1f5; --card:#ffffff; --ink:#1b2430; --muted:#5c6775;

  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--bg); color:var(--ink);

  a{color:var(--accent); text-decoration:none}

  /* верхняя липкая полоса */
  .topbar{
    position:sticky; top:0; z-index:20; display:flex; align-items:center;
    gap:12px; padding:9px 18px; background:rgba(27,36,48,.94); color:#fff;
    font-size:13px; letter-spacing:.2px; backdrop-filter:blur(4px);
  }
  .topbar .t-title{font-weight:600}
  .topbar .t-mode{margin-left:auto; padding:2px 10px; border-radius:20px;
    background:var(--accent); font-size:12px; font-weight:600}

  .page{max-width:980px; margin:0 auto; padding:0 20px 80px}

  /* обложка */
  .cover{padding:54px 0 26px; border-bottom:1px solid var(--line)}
  .cover h1{font-size:34px; line-height:1.2; margin:0 0 14px}
  .cover .sub{font-size:18px; color:var(--muted); margin:0 0 6px}
  .cover .sub.s2{margin-bottom:18px}
  .cover .lead{font-size:15px; color:var(--muted); max-width:70ch}

  /* оглавление-тайминг */
  .toc{margin:26px 0 0; background:var(--card); border:1px solid var(--line);
    border-radius:12px; box-shadow:var(--shadow); overflow:hidden}
  .toc h2{font-size:14px; text-transform:uppercase; letter-spacing:.8px;
    color:var(--muted); margin:0; padding:14px 18px; border-bottom:1px solid var(--line)}
  .toc ol{margin:0; padding:6px 0; list-style:none; counter-reset:b}
  .toc li{display:flex; align-items:baseline; gap:12px; padding:6px 18px}
  .toc li a{flex:1; color:var(--ink)}
  .toc li a:hover{color:var(--accent)}
  .toc .num{width:26px; color:var(--muted); font-variant-numeric:tabular-nums; text-align:right}
  .toc .time{color:var(--muted); font-size:13px; font-variant-numeric:tabular-nums; white-space:nowrap}
  .toc .core-dot{display:inline-block; width:8px; height:8px; border-radius:50%;
    background:var(--core); margin-left:6px; vertical-align:middle}

  /* разделитель блока */
  .block{margin-top:48px; border-top:4px solid var(--accent); padding-top:18px;
    scroll-margin-top:54px}
  .block.is-core{border-top-color:var(--core)}
  .block-head{display:flex; align-items:flex-start; gap:14px; flex-wrap:wrap}
  .block-num{flex:0 0 auto; width:42px; height:42px; border-radius:50%;
    background:var(--accent); color:#fff; font-size:19px; font-weight:700;
    display:flex; align-items:center; justify-content:center}
  .is-core .block-num{background:var(--core)}
  .block-title{flex:1 1 280px; min-width:0}
  .block-title h2{margin:0; font-size:22px; line-height:1.25}
  .badges{display:flex; gap:8px; flex-wrap:wrap; margin-left:auto; align-items:center}
  .badge{font-size:12px; font-weight:600; padding:4px 11px; border-radius:20px; white-space:nowrap}
  .badge.time{background:var(--accent-soft); color:var(--accent); font-variant-numeric:tabular-nums}
  .badge.core{background:var(--core-soft); color:var(--core)}

  /* цель и заметка спикера (только flow) */
  .goal{margin:14px 0 0; color:var(--muted); font-style:italic; font-size:15px}
  .goal b{font-style:normal; color:var(--ink)}
  .note{margin:14px 0 0; background:#fbfaf4; border:1px solid #ece6cf;
    border-left:4px solid #c9a227; border-radius:10px; padding:14px 16px}
  .note h4{margin:0 0 8px; font-size:12px; text-transform:uppercase;
    letter-spacing:.8px; color:#8a6d12}
  .note p{margin:0 0 10px}
  .note p:last-child{margin-bottom:0}
  .note ol{margin:6px 0 10px; padding-left:22px}
  .note ol li{margin:3px 0}
  .note .fallback{font-size:14px; color:var(--muted)}
  .note .fallback b{color:var(--ink)}

  /* карточка слайда */
  .slide{margin:18px 0 0; background:var(--card); border:1px solid var(--line);
    border-radius:12px; box-shadow:var(--shadow); padding:20px 22px}
  .slide-head{display:flex; align-items:baseline; gap:10px; margin-bottom:6px}
  .slide-no{font-size:12px; font-weight:700; color:#fff; background:var(--muted);
    padding:2px 9px; border-radius:6px; font-variant-numeric:tabular-nums}
  .slide h3{margin:0; font-size:19px; line-height:1.3}
  .theses{margin:8px 0 0; padding-left:0; list-style:none}
  .theses li{position:relative; padding-left:20px; margin:7px 0; font-size:16.5px}
  .theses li::before{content:""; position:absolute; left:4px; top:.62em;
    width:6px; height:6px; border-radius:50%; background:var(--accent)}
  .is-core-slide .theses li::before{background:var(--core)}
  .show{margin-top:14px; padding-top:11px; border-top:1px dashed var(--line);
    font-size:13.5px; color:var(--muted)}
  .show b{color:var(--ink); font-weight:600}
  .gh{margin-top:7px; font-size:13px; color:var(--muted)}
  .gh b{color:var(--ink); font-weight:600}
  .gh a{display:inline-block; margin:2px 0; padding:1px 7px; border:1px solid var(--line);
    border-radius:6px; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:12px; background:#f7f9fc}
  .gh a:hover{border-color:var(--accent); background:var(--accent-soft)}
  figure{margin:16px 0 0; text-align:center}
  figure img{max-width:100%; height:auto; border:1px solid var(--line);
    border-radius:8px; background:#fff}
  figure figcaption{margin-top:7px; font-size:13px; color:var(--muted)}

  .end{margin-top:48px; padding-top:18px; border-top:4px solid var(--line);
    color:var(--muted); font-size:14px}
  .end a{margin-right:14px}

  @media (max-width:640px){
    .page{padding:0 14px 60px}
    .cover h1{font-size:27px}
    .badges{margin-left:0; width:100%}
  }
  @media print{
    body{background:#fff}
    .topbar{display:none}
    .toc,.slide,.note{box-shadow:none}
    .block{break-before:page; border-top-width:3px}
    .block:first-of-type{break-before:auto}
    .slide{break-inside:avoid}
    figure{break-inside:avoid}
    a{color:var(--ink)}
  }
</style>
</head>

const BLOCKS = [
  {

function render(){
  document.getElementById('modeBadge').textContent =
    MODE === 'flow' ? 'версия: суфлёр' : 'версия: колода';
  document.title = MODE === 'flow'
    ? 'Лента доклада — суфлёр' : 'Лента доклада — колода';

  const app = document.getElementById('app');
  const parts = [];

  // обложка
  parts.push(`<header class="cover">
    <h1>${META.title}</h1>
    <p class="sub">${META.sub1}</p>
    <p class="sub s2">${META.sub2}</p>
    <p class="lead">${META.lead}</p>
  </header>`);

  // оглавление-тайминг
  parts.push(`<nav class="toc"><h2>Тайминг · 60 минут</h2><ol>` +
    BLOCKS.map(b => `<li>
        <span class="num">${b.n}.</span>
        <a href="#b${b.n}">${b.title}${b.core ? '<span class="core-dot" title="ядро"></span>' : ''}</a>
        <span class="time">${b.dur} · ${b.cum}</span>
      </li>`).join('') +
    `</ol></nav>`);

  // блоки
  for(const b of BLOCKS){
    const isCore = !!b.core;
    let s = `<section class="block${isCore?' is-core':''}" id="b${b.n}">
      <div class="block-head">
        <div class="block-num">${b.n}</div>
        <div class="block-title"><h2>${b.title}</h2></div>
        <div class="badges">
          ${isCore?`<span class="badge core">${b.core}</span>`:''}
          <span class="badge time">${b.dur} · ${b.cum}</span>
        </div>
      </div>`;

    if(MODE === 'flow'){
      s += `<p class="goal"><b>Цель:</b> ${b.goal}</p>`;
      let noteHtml = `<div class="note"><h4>Заметка спикера</h4>` +
        b.note.map(p=>`<p>${p}</p>`).join('');
      if(b.demo){
        noteHtml += `<p><b>Мини-сценарий демонстрации</b> (dev-сервер поднят заранее, браузер открыт на хосте ingress):</p>`;
        noteHtml += `<ol>` + b.demo.map(d=>`<li>${d}</li>`).join('') + `</ol>`;
      }
      if(b.fallback){
        noteHtml += `<p class="fallback"><b>Запасной вариант.</b> ${b.fallback}</p>`;
      }
      noteHtml += `</div>`;
      s += noteHtml;
    }

    for(const sl of b.slides){
      s += `<article class="slide${isCore?' is-core-slide':''}">
        <div class="slide-head">
          <span class="slide-no">Слайд ${sl.no}</span>
          <h3>${sl.title}</h3>
        </div>
        <ul class="theses">${sl.theses.map(t=>`<li>${t}</li>`).join('')}</ul>
        <div class="show"><b>Показать:</b> ${sl.show}.</div>
        ${sl.gh?`<div class="gh"><b>Открыть на GitHub:</b> ${sl.gh.map(g=>`<a href="${REPO}${g.p}" target="_blank" rel="noopener">${g.t}</a>`).join(' ')}</div>`:''}
        ${sl.img?`<figure><img src="../pics/${sl.img}" alt="${sl.cap||''}" loading="lazy"><figcaption>${sl.cap||''}</figcaption></figure>`:''}
      </article>`;
    }

    s += `</section>`;
    parts.push(s);
  }

  // подвал
  parts.push(`<footer class="end">
    <div>Связанные материалы:</div>
    <div style="margin-top:8px">${RELATED.map(r=>`<a href="${r[1]}">${r[0]}</a>`).join('')}</div>
  </footer>`);

  app.innerHTML = parts.join('\n');
}
render();
</script>
