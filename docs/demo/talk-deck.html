<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Презентация доклада</title>
<!--
  Полноэкранная презентация доклада. Один слайд на экран, навигация вперёд/назад.
  Цветовое решение и оформление — как в docs/demo/talk-flow.html (светлая схема).
  Содержание (META + BLOCKS) — копия один-в-один из talk-flow.html; при правке
  тезисов синхронизировать оба файла. Диаграммы — ссылки на ../pics/*.png, ссылки
  на исходники — на GitHub (REPO ниже). Управление: ← →, PageUp/Down, Space,
  Home/End, F — во весь экран.
-->
<style>
  :root{
    --bg:#eef1f5; --card:#ffffff; --ink:#1b2430; --muted:#5c6775;
    --accent:#1f6feb; --accent-soft:#e7f0ff; --core:#0f7b56; --core-soft:#e3f5ec;
    --line:#d6dce4; --code:#f0f2f5;
    --shadow:0 1px 3px rgba(20,30,45,.08),0 8px 24px rgba(20,30,45,.07);
  }
  *{box-sizing:border-box}
  html,body{height:100%; margin:0}
  body{
    background:var(--bg); color:var(--ink); overflow:hidden;
    font:16px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    background:var(--code); padding:.05em .35em; border-radius:5px;
    font-size:.86em; color:#1c2530}
  a{color:var(--accent); text-decoration:none}

  /* прогресс-бар */
  .progress{position:fixed; top:0; left:0; right:0; height:4px;
    background:rgba(20,30,45,.08); z-index:30}
  .progress-fill{height:100%; width:0; background:var(--accent); transition:width .25s ease}

  /* контейнер слайдов */
  .deck{position:fixed; inset:0}
  .slide{position:absolute; inset:clamp(10px,1.5vw,20px);
    display:flex; flex-direction:column;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    box-shadow:var(--shadow);
    padding:clamp(26px,4.6vh,56px) clamp(30px,5vw,72px) clamp(64px,9vh,84px);
    opacity:0; visibility:hidden; transition:opacity .25s ease; overflow:auto}
  .slide.is-active{opacity:1; visibility:visible}

  /* шапка контентного слайда */
  .s-head{display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    padding-bottom:14px; border-bottom:3px solid var(--accent);
    margin-bottom:clamp(14px,3vh,28px)}
  .s-head .blk{font-size:clamp(13px,1.7vh,16px); color:var(--muted)}
  .s-head .blk b{color:var(--ink); font-weight:600}
  .s-head .badge{margin-left:auto; font-size:clamp(12px,1.6vh,15px); font-weight:600;
    padding:4px 13px; border-radius:20px; background:var(--accent-soft); color:var(--accent);
    font-variant-numeric:tabular-nums; white-space:nowrap}
  .is-core .s-head{border-bottom-color:var(--core)}
  .is-core .s-head .badge{background:var(--core-soft); color:var(--core)}

  /* тело */
  .s-body{flex:1; display:flex; flex-direction:column; min-height:0}
  .s-slideno{font-size:clamp(11px,1.5vh,13px); letter-spacing:1.5px;
    text-transform:uppercase; color:var(--muted); margin-bottom:6px}
  .s-body h2{margin:0 0 clamp(12px,2.5vh,24px); font-size:clamp(25px,4.4vh,44px);
    line-height:1.15; letter-spacing:-.5px}

  .s-grid{flex:1; display:grid; grid-template-columns:1fr 1fr;
    gap:clamp(20px,4vw,48px); align-items:center; min-height:0}
  .s-grid.no-img{grid-template-columns:1fr}
  .s-grid.embed{align-items:stretch}

  /* встроенная страница документации */
  .doc-embed{display:flex; flex-direction:column; min-height:0; height:100%;
    border:1px solid var(--line); border-radius:10px; overflow:hidden;
    box-shadow:var(--shadow); background:#fff}
  .doc-bar{display:flex; align-items:center; gap:10px; padding:7px 12px;
    background:#f3f6fa; border-bottom:1px solid var(--line)}
  .doc-bar .doc-name{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:clamp(11px,1.5vh,13px); color:var(--muted); overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap}
  .doc-bar .doc-open{margin-left:auto; white-space:nowrap; font-weight:600;
    font-size:clamp(11px,1.5vh,13px); padding:3px 11px; border-radius:7px;
    background:var(--accent); color:#fff}
  .doc-bar .doc-open:hover{background:#1a5fd0}
  .doc-frame{flex:1; width:100%; border:0; background:#fff; min-height:42vh}
  figure{margin:0; text-align:center; min-height:0; display:flex;
    flex-direction:column; justify-content:center}
  figure img{max-width:100%; max-height:58vh; object-fit:contain;
    border:1px solid var(--line); border-radius:10px; background:#fff; padding:6px}
  figcaption{margin-top:10px; font-size:clamp(12px,1.6vh,15px); color:var(--muted)}

  /* левая колонка: тезисы сверху, диаграмма под ними */
  .left-col{display:flex; flex-direction:column; min-height:0; overflow:auto; gap:clamp(10px,2vh,20px)}
  .left-col .theses{align-self:stretch}
  .slide-fig{margin:0; text-align:center; flex:0 0 auto}
  .slide-fig img{max-width:100%; max-height:30vh; object-fit:contain;
    border:1px solid var(--line); border-radius:8px; background:#fff; padding:5px}
  .slide-fig figcaption{margin-top:7px; font-size:clamp(11px,1.5vh,14px); color:var(--muted)}

  .theses{margin:0; padding:0; list-style:none; align-self:center}
  .theses li{position:relative; padding-left:30px; margin:clamp(8px,1.8vh,18px) 0;
    font-size:clamp(16px,2.5vh,25px); line-height:1.35}
  .theses li::before{content:""; position:absolute; left:6px; top:.55em;
    width:9px; height:9px; border-radius:50%; background:var(--accent)}
  .is-core .theses li::before{background:var(--core)}
  .theses.small li{font-size:clamp(13px,1.9vh,18px); margin:clamp(5px,1.1vh,11px) 0}

  /* подвал слайда: показать + github */
  .s-foot{margin-top:clamp(12px,2.4vh,22px); padding-top:12px;
    border-top:1px dashed var(--line)}
  .s-foot .show{font-size:clamp(12px,1.7vh,15px); color:var(--muted)}
  .s-foot .show b{color:var(--ink)}
  .s-foot .gh{margin-top:8px; display:flex; flex-wrap:wrap; gap:7px; align-items:center}
  .s-foot .gh .lbl{font-size:clamp(12px,1.6vh,14px); color:var(--ink); font-weight:600}
  .s-foot .gh a{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:clamp(11px,1.5vh,13px); padding:3px 10px; border:1px solid var(--line);
    border-radius:7px; background:#f7f9fc; color:var(--accent)}
  .s-foot .gh a:hover{border-color:var(--accent); background:var(--accent-soft)}
  .s-foot .gh a.gh-main{font-weight:600; color:#fff; background:var(--accent);
    border-color:var(--accent); padding:4px 12px}
  .s-foot .gh a.gh-main:hover{background:#1a5fd0}

  /* титульный контентный слайд (Слайд 1): текстовый титул + скриншот индекса */
  .title-col{align-self:center}
  .title-col .kicker{font-size:clamp(12px,1.7vh,15px); letter-spacing:2.5px;
    text-transform:uppercase; color:var(--accent); margin-bottom:14px}
  .title-col .title-h{margin:0 0 14px; font-size:clamp(24px,4.2vh,42px);
    line-height:1.12; letter-spacing:-.8px}
  .title-col .title-sub{margin:4px 0; color:var(--muted); font-size:clamp(14px,2vh,19px)}
  .title-col .who{margin-top:16px; font-weight:600; font-size:clamp(15px,2.1vh,20px)}
  .title-col .who span{display:block; font-weight:400; color:var(--muted); font-size:clamp(12px,1.7vh,15px)}

  /* титул (cover) */
  .cover{justify-content:center; text-align:center; align-items:center}
  .cover .kicker{font-size:clamp(12px,1.8vh,15px); letter-spacing:3px;
    text-transform:uppercase; color:var(--accent); margin-bottom:clamp(16px,3vh,28px)}
  .cover h1{margin:0 0 clamp(16px,3vh,26px); font-size:clamp(30px,6.2vh,62px);
    line-height:1.1; max-width:18ch; letter-spacing:-1px}
  .cover .sub{margin:4px 0; font-size:clamp(15px,2.3vh,23px); color:var(--muted); max-width:46ch}
  .cover .author{margin-top:clamp(28px,5vh,52px); font-size:clamp(17px,2.6vh,26px); font-weight:600}
  .cover .org{font-size:clamp(13px,1.9vh,17px); color:var(--muted); margin-top:4px}
  .cover .hint{margin-top:clamp(26px,5vh,46px); font-size:13px; color:var(--muted)}
  .cover .hint kbd{background:#f0f2f5; border:1px solid var(--line);
    border-radius:5px; padding:1px 7px; font-family:inherit; font-size:12px}

  /* закрытие */
  .outro{justify-content:center; text-align:center; align-items:center}
  .outro h1{margin:0 0 clamp(18px,3.5vh,30px); font-size:clamp(28px,5.5vh,56px); letter-spacing:-1px}
  .outro p{margin:6px 0; font-size:clamp(15px,2.3vh,22px); color:var(--muted); max-width:52ch}
  .outro .contacts{margin-top:clamp(26px,5vh,46px); display:flex; flex-direction:column; gap:10px}
  .outro .contacts a{font-size:clamp(16px,2.4vh,22px)}
  .outro .contacts .c-lbl{font-size:13px; color:var(--muted); letter-spacing:1px; text-transform:uppercase}

  /* навигация */
  .nav{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:30;
    display:flex; align-items:center; gap:10px; padding:7px 10px;
    background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:30px;
    box-shadow:var(--shadow); backdrop-filter:blur(6px)}
  .nav-btn{appearance:none; cursor:pointer; border:1px solid var(--line);
    background:#fff; color:var(--ink); border-radius:50%; width:38px; height:38px;
    font-size:20px; line-height:1; display:flex; align-items:center; justify-content:center}
  .nav-btn:hover{border-color:var(--accent); color:var(--accent)}
  .nav-btn:disabled{opacity:.35; cursor:default}
  .nav-btn.fs{width:auto; border-radius:20px; padding:0 14px; font-size:13px; font-weight:600}
  .counter{min-width:62px; text-align:center; font-size:14px; color:var(--muted);
    font-variant-numeric:tabular-nums}

  @media print{
    body{overflow:visible; background:#fff}
    .progress,.nav{display:none}
    .deck{position:static}
    .slide{position:relative; inset:auto; opacity:1!important; visibility:visible!important;
      break-after:page; min-height:96vh; box-shadow:none; margin:0 0 10px}
  }
</style>
</head>
<body>
<div class="progress"><div class="progress-fill" id="pfill"></div></div>
<main class="deck" id="deck"></main>
<div class="nav">
  <button id="prev" class="nav-btn" aria-label="Назад" title="Назад (←)">‹</button>
  <span class="counter" id="counter">1 / 18</span>
  <button id="next" class="nav-btn" aria-label="Вперёд" title="Вперёд (→)">›</button>
  <button id="fs" class="nav-btn fs" title="Во весь экран (F)">во весь экран</button>
</div>
<script>
const REPO = "https://github.com/nedlosster/werf_ci_demo/blob/main/";
const META = {
  title: "Доставка по контракту: два стека — один werf converge",
  sub1: "Разработка прямо в dev-кластере, где dev неотличим от prod.",
  sub2: "Дистилят практики Kubernetes 2020–2025.",
  lead: "Лента слайдов доклада (~64 минуты): одиннадцать блоков с таймингом, тезисами и диаграммами. Прокручивается сверху вниз — по ней ведётся рассказ. Границы блоков и слайдов отчёркнуты; ядро часа выделено зелёным."
};

const BLOCKS = [
  {
    n:1, title:"Вступление: дистилляция опыта 2020–2025", dur:"3 мин", cum:"0:00–3:00",
    goal:"Задать рамку и сразу обозначить, что демонстрируется не приложение, а способ его доставки и разработки, выросший из практики.",
    note:["Открываем рамкой: это не разбор приложения, а дистилляция личного опыта разработки под Kubernetes за 2020–2025. Контур и приёмы пришли из реальной работы, а не из учебного примера. Репозиторий показывает, как единый CI-контур ставит разнородные приложения в уже развёрнутые кластеры двух окружений по общему контракту. Разворачивание самих кластеров — вне скопа, работаем против готового кластера. Бизнес-логика продуктов минимальна по замыслу: внимание на том, как доставляем и разрабатываем, а не что."],
    slides:[
      {no:1, title:"Титул", theses:[
        "демо: единый CI-контур ставит разнородные приложения в готовые кластеры dev и prod",
        "дистилляция личного опыта разработки под Kubernetes за 2020–2025, не учебный пример",
        "граница доклада — как доставляем и как разрабатываем, а не что доставляем",
        "два контрастных продукта, общий контракт <code>.helm/def.sh</code>, разработка прямо в кластере"
      ], show:"титульный кадр и индекс документации одним экраном"},
      {no:2, title:"Дистилляция опыта 2020–2025", theses:[
        "контур и приёмы выросли из реальной работы, а не из учебного примера",
        "демонстрируется способ доставки и разработки, не приложение",
        "кластеры считаем уже развёрнутыми, их разворачивание вне скопа",
        "бизнес-логика продуктов минимальна по замыслу"
      ], show:"обзор продуктов", gh:[{t:"README.md", p:"README.md"}]}
    ]
  },
  {
    n:2, title:"Проблема доставки и werf converge", dur:"6 мин", cum:"3:00–9:00",
    goal:"Объяснить, почему доставка в Kubernetes распадается на две половины, и ввести werf converge как инструмент, который их сшивает из одного git-состояния.",
    note:["Доставка в Kubernetes распадается на две половины — сборка образа и применение релиза. Большинство инструментов закрывают одну, а стык (синхронизация тегов, пересборка изменившихся слоёв) держит инженер скриптами; эта работа повторяется в каждой команде и плохо переносится между проектами. werf совмещает обе половины в одной программе и одном запуске. Центральная команда — <code>werf converge</code>: собирает недостающие образы, публикует их в registry и применяет релиз; идемпотентна, в демо запускается атомарно. Сборка разбита на кешируемые стадии — пересобирается только затронутое правкой. По умолчанию werf требует git (giterminism); в демо это ослаблено ради сборки из рабочего дерева — вернёмся к этому в блоке про контекст. На экране показать строку активации канала: <code>source \"$(~/bin/trdl use werf 2 stable)\"</code>."],
    slides:[
      {no:3, title:"Проблема доставки в Kubernetes", theses:[
        "доставка распадается на сборку образа и применение релиза",
        "большинство инструментов закрывают одну половину",
        "стык держит инженер: синхронизация тегов, пересборка слоёв",
        "работа повторяется в каждой команде и плохо переносится"
      ], show:"доставка в Kubernetes, схема industrial-cicd",
        gh:[{t:"delivery-to-k8s.md", p:"docs/concepts/delivery-to-k8s.md"}],
        img:"industrial-cicd.png", cap:"Промышленный CI/CD: сборка → registry → релиз"},
      {no:4, title:"werf converge сшивает обе половины", theses:[
        "сборка и применение релиза в одной программе из одного git-состояния",
        "<code>werf converge</code>: собрать, опубликовать, применить; идемпотентен, в демо атомарен",
        "сборка по кешируемым стадиям, пересборка только затронутого",
        "giterminism по умолчанию; в демо ослаблен — см. контекстный слайд"
      ], show:"введение в werf, поток converge",
        gh:[{t:"werf-intro.md", p:"docs/concepts/werf-intro.md"}],
        img:"converge-flow.png", cap:"Поток werf converge: build → publish → deploy"}
    ]
  },
  {
    n:3, title:"Контур kube_ci и контракт .helm/def.sh", dur:"6 мин", cum:"9:00–15:00",
    core:"ядро · тема 1",
    goal:"Показать, что kube_ci — тонкая bash-обёртка над werf, а развязка с продуктом держится на контракте .helm/def.sh. Это первая тема ядра.",
    note:["Первая тема ядра. kube_ci сведён к базовым операциям над уже развёрнутым кластером; логика вынесена в общие библиотеки <code>utils/</code>, а окружения подмешивают локальные <code>k8s_defs</code> и <code>productlist</code>. Контур не знает внутренностей продукта — он работает по контракту <code>.helm/def.sh</code>: env-функция окружения экспортирует <code>APPNAME</code>, <code>ENVNAME</code>, <code>CI_URL</code>, <code>CI_TAG</code> и опционально <code>NAMESPACE</code>. <code>deploy()</code> читает только реально экспортированные CI_*-переменные (<code>${!CI_@}</code>) и пробрасывает их в helm как <code>--set</code>; <code>CI_TAG</code> идёт отдельным тегом образов. Весь обмен между продуктом и контуром — через эти переменные и набор образов из <code>werf.yaml</code>; новый продукт подключается без правок в kube_ci."],
    slides:[
      {no:5, title:"Контур kube_ci и контракт", theses:[
        "тонкая bash-обёртка над werf, не своя система сборки",
        "базовые операции над готовым кластером; логика — в <code>utils/</code>",
        "окружения подмешивают локальные <code>k8s_defs</code> и <code>productlist</code>",
        "контракт <code>.helm/def.sh</code>: <code>APPNAME</code>, <code>ENVNAME</code>, <code>CI_URL</code>, <code>CI_TAG</code>, опц. <code>NAMESPACE</code>",
        "<code>deploy()</code> читает только <code>${!CI_@}</code> и пробрасывает в helm; контур не знает продукт"
      ], show:"диаграмма архитектуры, контракт приложения",
        gh:[{t:".helm/def.sh (app1)", p:"apps/app1-java-react/.helm/def.sh"},{t:"utils/03-werf-converge.sh", p:"kube_ci/utils/03-werf-converge.sh"}],
        img:"architecture.png", cap:"Архитектура: apps → kube_ci → кластер"}
    ]
  },
  {
    n:4, title:"Два контрастных продукта как доказательство", dur:"5 мин", cum:"15:00–20:00",
    core:"ядро · тема 1",
    goal:"Объяснить, зачем в демо два продукта на разных стеках и что именно это доказывает про развязку из блока 3.",
    note:["app1-java-react (React + Spring Boot) и app2-python-angular (Angular + FastAPI) разведены по языку, веб-фреймворку, менеджерам пакетов бэка (Maven / pip) и фронта (pnpm / npm) и модели health-проб. Один продукт ничего не доказывает — под него легко подогнать оркестрацию; два разных стека показывают, что в контуре нет скрытого знания о приложении. kube_ci исполняет для обоих один <code>werf converge</code> без единой ветки «если это app1»; различия живут в <code>Dockerfile</code>, <code>werf.yaml</code> и чарте продукта."],
    slides:[
      {no:6, title:"Два контрастных продукта", theses:[
        "<code>app1-java-react</code>: React + Spring Boot",
        "<code>app2-python-angular</code>: Angular + FastAPI",
        "разведены по языку, веб-фреймворку, менеджерам пакетов (Maven/pip, pnpm/npm), health-пробам",
        "один converge на оба, без ветки «если это app1»",
        "различия живут в <code>Dockerfile</code>, <code>werf.yaml</code>, чарте"
      ], show:"обзор продуктов, таблица стеков, анатомия продукта",
        gh:[{t:"werf.yaml (app1)", p:"apps/app1-java-react/werf.yaml"},{t:"werf.yaml (app2)", p:"apps/app2-python-angular/werf.yaml"},{t:".helm/def.sh (app2)", p:"apps/app2-python-angular/.helm/def.sh"}],
        img:"product-anatomy.png", cap:"Анатомия продукта: Dockerfile, werf.yaml, чарт"}
    ]

// ---- карта документа для правой части каждого слайда (ключ — sl.no) ----
// slug — страница в embed/, gh — путь .md от корня репозитория для ссылки на GitHub.
const DOC = {
  1:{slug:'readme', gh:'docs/README.md'},
  2:{slug:'overview', gh:'docs/products/overview.md'},
  3:{slug:'delivery-to-k8s', gh:'docs/concepts/delivery-to-k8s.md'},
  4:{slug:'werf-intro', gh:'docs/concepts/werf-intro.md'},
  5:{slug:'application-contract', gh:'docs/concepts/application-contract.md'},
  6:{slug:'overview', gh:'docs/products/overview.md'},
  7:{slug:'dev-in-cluster', gh:'docs/delivery/dev-in-cluster.md'},
  8:{slug:'dev-in-cluster-vs-tools', gh:'docs/delivery/dev-in-cluster-vs-tools.md'},
  9:{slug:'dev-workflow-cycle', gh:'docs/delivery/dev-workflow-cycle.md'},
  10:{slug:'app1-java-react', gh:'docs/products/app1-java-react.md'},
  11:{slug:'dev-caches-and-volumes', gh:'docs/delivery/dev-caches-and-volumes.md'},
  12:{slug:'kube-ci-operations', gh:'docs/delivery/kube-ci-operations.md'},
  13:{slug:'dev-prod', gh:'docs/delivery/dev-prod.md'},
  14:{slug:'security-and-tradeoffs', gh:'docs/concepts/security-and-tradeoffs.md'},
  15:{slug:'integrations', gh:'docs/integrations/README.md'},
  16:{slug:'secrets', gh:'docs/delivery/secrets.md'},
  17:{slug:'readme', gh:'docs/README.md'},
  18:{slug:'qa-bank', gh:'docs/demo/qa-bank.md'}
};

function embedPanel(doc){
  return `<div class="doc-embed">
    <div class="doc-bar">
      <span class="doc-name">${doc.gh}</span>
      <a class="doc-open" href="${REPO}${doc.gh}" target="_blank" rel="noopener">GitHub ↗</a>
    </div>
    <iframe class="doc-frame" src="embed/${doc.slug}.html" loading="lazy" title="${doc.gh}"></iframe>
  </div>`;
}

function footHTML(sl, doc){
  const main = `<a class="gh-main" href="${REPO}${doc.gh}" target="_blank" rel="noopener">Открыть на GitHub: ${doc.gh}</a>`;
  const chips = sl.gh ? sl.gh.map(g=>`<a href="${REPO}${g.p}" target="_blank" rel="noopener">${g.t}</a>`).join('') : '';
  return `<div class="s-foot">
    <div class="show"><b>Показать:</b> ${sl.show}.</div>
    <div class="gh"><span class="lbl">GitHub:</span>${main}${chips}</div>
  </div>`;
}

// ---- сборка плоского списка слайдов: титул + контент из BLOCKS + закрытие ----
const SLIDES = [{type:'cover'}];
for(const b of BLOCKS){
  for(const sl of b.slides){ SLIDES.push({type:'content', b, sl}); }
}
SLIDES.push({type:'outro'});

function slideHTML(s){
  if(s.type === 'cover'){
    return `<section class="slide cover">
      <div class="kicker">Демонстрация · ГНИВЦ</div>
      <h1>${META.title}</h1>
      <p class="sub">${META.sub1}</p>
      <p class="sub">${META.sub2}</p>
      <div class="author">Олейник Денис Сергеевич</div>
      <div class="org">ГНИВЦ</div>
      <div class="hint">Навигация: <kbd>←</kbd> <kbd>→</kbd> · <kbd>Space</kbd> · <kbd>F</kbd> — во весь экран</div>
    </section>`;
  }
  if(s.type === 'outro'){
    return `<section class="slide outro">
      <h1>Спасибо за внимание</h1>
      <p>Доставка по контракту, разработка прямо в кластере и операции на живых командах — дистилляция практики Kubernetes 2020–2025.</p>
      <p>Вопросы и обсуждение — сейчас или по контактам ниже.</p>
      <div class="contacts">
        <div><span class="c-lbl">Почта</span><br><a href="mailto:oleynikds@gnivc.ru">oleynikds@gnivc.ru</a></div>
        <div><span class="c-lbl">GitHub</span><br><a href="https://github.com/nedlosster" target="_blank" rel="noopener">github.com/nedlosster</a></div>
        <div><span class="c-lbl">Репозиторий демо</span><br><a href="https://github.com/nedlosster/werf_ci_demo" target="_blank" rel="noopener">github.com/nedlosster/werf_ci_demo</a></div>
      </div>
    </section>`;
  }
  const b = s.b, sl = s.sl, core = !!b.core;
  const doc = DOC[sl.no];
  // Слайд 1 «Титул»: текстовый титул слева + встроенный индекс документации справа
  if(b.n === 1 && sl.no === 1){
    return `<section class="slide content title-slide">
      <div class="s-head">
        <span class="blk">Блок ${b.n} · <b>${b.title}</b></span>
        <span class="badge">${b.dur} · ${b.cum}</span>
      </div>
      <div class="s-body">
        <div class="s-slideno">Слайд ${sl.no}</div>
        <div class="s-grid embed">
          <div class="title-col">
            <div class="kicker">Демонстрация · ГНИВЦ</div>
            <h2 class="title-h">${META.title}</h2>
            <p class="title-sub">${META.sub1}</p>
            <p class="title-sub">${META.sub2}</p>
            <div class="who">Олейник Денис Сергеевич<span>ГНИВЦ</span></div>
            <ul class="theses small">${sl.theses.map(t=>`<li>${t}</li>`).join('')}</ul>
          </div>
          ${embedPanel(doc)}
        </div>
        ${footHTML(sl, doc)}
      </div>
    </section>`;
  }
  const theses = `<ul class="theses">${sl.theses.map(t=>`<li>${t}</li>`).join('')}</ul>`;
  const fig = sl.img
    ? `<figure class="slide-fig"><img src="../pics/${sl.img}" alt="${sl.cap||''}"><figcaption>${sl.cap||''}</figcaption></figure>`
    : '';
  return `<section class="slide content${core?' is-core':''}">
    <div class="s-head">
      <span class="blk">Блок ${b.n} · <b>${b.title}</b></span>
      <span class="badge">${b.dur} · ${b.cum}${core?' · '+b.core:''}</span>
    </div>
    <div class="s-body">
      <div class="s-slideno">Слайд ${sl.no}</div>
      <h2>${sl.title}</h2>
      <div class="s-grid embed"><div class="left-col">${theses}${fig}</div>${embedPanel(doc)}</div>
      ${footHTML(sl, doc)}
    </div>
  </section>`;
}

// ---- рендер и навигация ----
const deck = document.getElementById('deck');
deck.innerHTML = SLIDES.map(slideHTML).join('\n');
const nodes = Array.from(deck.querySelectorAll('.slide'));
const total = nodes.length;
const counter = document.getElementById('counter');
const pfill = document.getElementById('pfill');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const fsBtn = document.getElementById('fs');
let idx = 0;

function clamp(i){ return Math.max(0, Math.min(total-1, i)); }
function show(i, push){
  idx = clamp(i);
  nodes.forEach((n,k)=>n.classList.toggle('is-active', k===idx));
  counter.textContent = (idx+1) + ' / ' + total;
  pfill.style.width = (total>1 ? (idx/(total-1))*100 : 100) + '%';
  prevBtn.disabled = idx===0;
  nextBtn.disabled = idx===total-1;
  nodes[idx].scrollTop = 0;
  if(push !== false){ history.replaceState(null, '', '#' + (idx+1)); }
}
function next(){ show(idx+1); }
function prev(){ show(idx-1); }

nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);
fsBtn.addEventListener('click', ()=>{
  if(document.fullscreenElement){ document.exitFullscreen(); }
  else { document.documentElement.requestFullscreen?.(); }
});
document.addEventListener('keydown', e=>{
  if(['ArrowRight','PageDown',' ','Spacebar','Enter'].includes(e.key)){ e.preventDefault(); next(); }
  else if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); prev(); }
  else if(e.key==='Home'){ e.preventDefault(); show(0); }
  else if(e.key==='End'){ e.preventDefault(); show(total-1); }
  else if(e.key==='f'||e.key==='F'){ fsBtn.click(); }
});
// свайпы для тачскрина
let tx=null;
deck.addEventListener('touchstart', e=>{ tx = e.changedTouches[0].clientX; }, {passive:true});
deck.addEventListener('touchend', e=>{
  if(tx===null) return;
  const dx = e.changedTouches[0].clientX - tx;
  if(Math.abs(dx) > 50){ dx < 0 ? next() : prev(); }
  tx = null;
}, {passive:true});

const fromHash = parseInt((location.hash||'').replace('#',''), 10);
show(Number.isFinite(fromHash) ? fromHash-1 : 0, false);
window.addEventListener('hashchange', ()=>{
  const h = parseInt((location.hash||'').replace('#',''),10);
  if(Number.isFinite(h)) show(h-1, false);
});
</script>
