apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app2-python-angular
  labels:
    {{- include "app2.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.domain | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: app2-python-angular-backend
                port:
                  number: {{ .Values.backend.port }}
{{- if .Values.pgadmin.enabled }}
          - path: /pgadmin
            pathType: Prefix
            backend:
              service:
                name: app2-python-angular-pgadmin
                port:
                  number: 80
{{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app2-python-angular-frontend
                port:
                  number: {{ .Values.frontend.port }}
