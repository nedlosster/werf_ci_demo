apiVersion: v1
kind: Service
metadata:
  name: app2-python-angular-postgres
  labels:
    {{- include "app2.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "app2.name" . }}
    component: postgres
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: app2-python-angular-postgres
  labels:
    {{- include "app2.labels" . | nindent 4 }}
spec:
  serviceName: app2-python-angular-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app2.name" . }}
      component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app2.name" . }}
        component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app2-python-angular-secrets
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.postgres.storageClass }}
        resources:
          requests:
            storage: {{ .Values.postgres.storageSize }}
