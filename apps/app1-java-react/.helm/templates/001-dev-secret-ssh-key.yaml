{{- if eq .Values.env "dev" }}
# SSH-ключ для clone приватного монорепо. Файл .helm/tmp/id_rsa-vcs кладёт
# оператор (в .gitignore). Если файла нет -- ключ пустой, clone делается вручную.
apiVersion: v1
kind: Secret
metadata:
  name: id-rsa-vcs
  labels:
    {{- include "app1.labels" . | nindent 4 }}
type: Opaque
data:
  id_rsa: {{ .Files.Get "tmp/id_rsa-vcs" | b64enc | quote }}
{{- end }}
