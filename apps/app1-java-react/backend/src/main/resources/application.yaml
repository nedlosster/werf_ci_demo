server:
  port: 8080
  # Всё приложение под /api -- так swagger-ui и его ассеты попадают под путь,
  # который ingress маршрутизирует на бек (/api -> backend).
  servlet:
    context-path: /api

management:
  # actuator на отдельном порту (вне context-path) -- для k8s-проб.
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

spring:
  application:
    name: app1-java-react-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:app1}
    username: ${DB_USER:app1}
    password: ${DB_PASSWORD:app1pass}

# version подставляется Maven resource-filtering из <version> pom.xml
app:
  version: '@project.version@'
